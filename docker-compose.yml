version: '3.8'

services:

  # ── SQL Server ───────────────────────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ecommerce_sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Your_password123"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P Your_password123 -Q 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API ───────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecommerce_api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=EcommerceCatalog;User Id=sa;Password=Your_password123;TrustServerCertificate=True;
      - Azure__BlobStorage__ConnectionString=${AZURE_BLOB_CONNECTION_STRING}
      - Azure__BlobStorage__ContainerName=product-images
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: on-failure

volumes:
  sqlserver_data:
